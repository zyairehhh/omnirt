site_name: OmniRT
site_description: 面向 CUDA 与 Ascend 后端的开源图像、视频与音频数字人生成运行时。
site_url: https://datascale-ai.github.io/omnirt/
repo_url: https://github.com/datascale-ai/omnirt
repo_name: datascale-ai/omnirt
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  logo: assets/logos/omnirt-mark.svg
  favicon: assets/logos/omnirt-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.critic
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            summary: true
            docstring_style: google
            filters: ["!^_"]
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          build: true
          name: 简体中文
          link: /
          site_name: OmniRT
          site_description: 面向 CUDA 与 Ascend 后端的开源图像、视频与音频数字人生成运行时。
          theme:
            language: zh
        - locale: en
          build: true
          name: English
          link: /en/
          site_name: OmniRT
          site_description: Open image, video, and audio-driven avatar generation runtime with CUDA and Ascend backends.
          theme:
            language: en
          nav:
            - Home: index.md
            - User Guide:
                - Overview: user_guide/index.md
                - Getting Started:
                    - Quickstart: getting_started/quickstart.md
                - Generation:
                    - Overview: user_guide/generation/index.md
                    - Text to Image: user_guide/generation/text2image.md
                    - Text to Audio: user_guide/generation/text2audio.md
                    - Image to Image: user_guide/generation/image2image.md
                    - Text to Video: user_guide/generation/text2video.md
                    - Image to Video: user_guide/generation/image2video.md
                    - Talking Head: user_guide/generation/talking_head.md
                - Serving:
                    - Overview: user_guide/serving/index.md
                    - CLI: user_guide/serving/cli.md
                    - Python API: user_guide/serving/python_api.md
                    - HTTP Server: user_guide/serving/http_server.md
                    - FlashTalk WebSocket: user_guide/serving/flashtalk_ws.md
                - Deployment:
                    - Overview: user_guide/deployment/index.md
                    - CUDA: user_guide/deployment/cuda.md
                    - Ascend Backend: user_guide/deployment/ascend.md
                    - Domestic Deployment: user_guide/deployment/china_mirrors.md
                    - Docker: user_guide/deployment/docker.md
                    - Distributed Serving: user_guide/deployment/distributed_serving.md
                - Models:
                    - Overview: user_guide/models/index.md
                    - Supported Models: user_guide/models/supported_models.md
                    - Support Status: user_guide/models/support_status.md
                    - Roadmap: user_guide/models/roadmap.md
                - Features:
                    - Overview: user_guide/features/index.md
                    - Presets: user_guide/features/presets.md
                    - Validation: user_guide/features/validation.md
                    - Service Schema: user_guide/features/service_schema.md
                    - Dispatch & Queue: user_guide/features/dispatch_queue.md
                    - Telemetry: user_guide/features/telemetry.md
            - Developer Guide:
                - Overview: developer_guide/index.md
                - Contributing: developer_guide/contributing.md
                - Architecture: developer_guide/architecture.md
                - Legacy Optimization Guide: developer_guide/legacy_optimization_guide.md
                - Benchmark Baseline: developer_guide/benchmark_baseline.md
                - FlashHead Benchmark: developer_guide/flashhead_benchmark.md
                - CosyVoice Benchmark: developer_guide/cosyvoice_benchmark.md
                - Model Onboarding: developer_guide/model_onboarding.md
                - Backend Onboarding: developer_guide/backend_onboarding.md
            - API Reference:
                - Overview: api_reference/index.md
                - "omnirt": api_reference/top_level.md
                - "omnirt.requests": api_reference/requests.md
                - "omnirt.core.types": api_reference/types.md
                - "omnirt.core.registry": api_reference/registry.md
                - "omnirt.core.presets": api_reference/presets.md
                - "omnirt.core.validation": api_reference/validation.md
                - "omnirt.engine": api_reference/engine.md
            - CLI Reference: cli_reference/index.md
            - Community:
                - Overview: community/index.md
                - Publishing Docs: community/publishing_docs.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript/logo-theme.js

