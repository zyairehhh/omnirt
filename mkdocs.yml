      - 生成任务:
          - 概览: user_guide/generation/index.md
          - 文本到图像: user_guide/generation/text2image.md
          - 文本到音频: user_guide/generation/text2audio.md
          - 图像到图像: user_guide/generation/image2image.md
          - 文本到视频: user_guide/generation/text2video.md
