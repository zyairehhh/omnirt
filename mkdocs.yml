site_name: OmniRT
site_description: 面向 CUDA 与 Ascend 后端的开源图像与视频生成运行时。
site_url: https://datascale-ai.github.io/omnirt/
repo_url: https://github.com/datascale-ai/omnirt
repo_name: datascale-ai/omnirt

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          build: true
          name: 简体中文
          link: /
          site_name: OmniRT
          site_description: 面向 CUDA 与 Ascend 后端的开源图像与视频生成运行时。
          theme:
            language: zh
        - locale: en
          build: true
          name: English
          link: /en/
          site_name: OmniRT
          site_description: Open image and video generation runtime with CUDA and Ascend backends.
          theme:
            language: en
          nav:
            - Home: index.md
            - Getting Started: getting-started.md
            - Usage:
                - CLI: cli.md
                - Python API: python-api.md
                - Presets: presets.md
            - Guides:
                - Architecture: architecture.md
                - Service Schema: service-schema.md
                - Model Onboarding: model-onboarding.md
                - Support Status: support-status.md
                - Domestic Deployment: china-deployment.md
                - Ascend Backend: backend-ascend.md
            - Model List:
                - Supported Models (generated): _generated/models.md
            - Project:
                - Publishing Docs: publishing-docs.md

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 使用指南:
      - CLI: cli.md
      - Python API: python-api.md
      - Presets: presets.md
  - 深入说明:
      - 架构说明: architecture.md
      - 服务协议: service-schema.md
      - 模型接入: model-onboarding.md
      - 当前支持状态: support-status.md
      - 国内部署: china-deployment.md
      - Ascend 后端: backend-ascend.md
  - 模型列表:
      - 支持模型（自动生成）: _generated/models.md
  - 项目维护:
      - 文档发布: publishing-docs.md
